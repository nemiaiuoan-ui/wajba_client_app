name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Permet de lancer manuellement depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Installer Java 17 (requis pour Gradle moderne)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Installer Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'  # Change selon ta version
          channel: 'stable'
          cache: true

      # 4. Créer google-services.json depuis les secrets GitHub
      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # 5. Créer firebase_options.dart depuis les secrets (si nécessaire)
      # - name: Create firebase_options.dart
      #   run: |
      #     echo '${{ secrets.FIREBASE_OPTIONS }}' > lib/firebase_options.dart

      # 6. Installer les dépendances
      - name: Install dependencies
        run: flutter pub get

      # 7. Vérifier le code (optionnel mais utile)
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 8. Builder l'APK (debug - pas besoin de keystore)
      - name: Build APK Debug
        run: flutter build apk --debug --no-tree-shake-icons

      # 9. Uploader l'APK comme artifact téléchargeable
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wajba-client-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

